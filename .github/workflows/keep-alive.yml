name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 10 * * *'  # Roda todo dia às 07h (horário de Brasília)
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub se necessário

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/moradores?select=id&limit=1")
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: Supabase retornou status inesperado ($STATUS)"
            exit 1
          fi
          echo "Supabase ativo."
